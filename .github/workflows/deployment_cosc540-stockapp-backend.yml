name: Build and deploy Python app to Azure Web App - cosc540-stockapp-backend

on:
  push:
    branches: [Deployment]
    paths:
      - "Backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: cosc540-stockapp-backend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: Backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-app
          path: Backend

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8A1D387F3B9F4B66AB99A52BA82DF217 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AE51BEF0606E49DA9C721684B644AB13 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1E0B6AD17C3140A78C735D6D2F9BDECC }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: "cosc540-stockapp-backend"
          slot-name: "Production"
          package: Backend
